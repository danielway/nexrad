[workspace]
resolver = "2"
members = [
    "nexrad-model",
    "nexrad-decode",
    "nexrad-data"
]

[workspace.dependencies]
chrono = {version="0.4"}
uom = {version="0.36"}
serde = {version="1.0", features=["derive"]}
thiserror = "1.0"
bincode = "1.3"
reqwest = {version="0.12"}
xml = {version="0.8"}
bzip2 = {version="0.4"}
